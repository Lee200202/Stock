name: daily-transcript-pipeline

# ------------------------------------------------------------------ #
# 排程設計的核心：這是「輪詢」，不是「執行一次」。
#
# 11:30 直播還在進行，YouTube 的 VOD 尚未生成，NotebookLM 索引不到。
# 直播約 12:30 到 13:00 結束，YouTube 再花十幾分鐘轉檔，
# 所以逐字稿真正拿得到的時間點落在 13:00 到 14:00 之間，而且每天不一定。
#
# 因此流程必須從 11:33 開始每 10 分鐘敲一次門，敲到有東西為止。
# 敲不到不是失敗，是還沒好，工作要顯示綠色，不能發告警。
#
# 這件事能成立的前提是「敲門要快」。pipeline.py 的 POLL_TIMEOUT 設為 4 分鐘，
# 索引不到就立刻放棄讓下一輪接手。若像先前那樣一次等 30 分鐘，
# 一次敲門就吃掉三個輪詢窗口，concurrency 又把後面全擋在佇列，
# 結果就是排程看起來完全沒有在 11:30 執行。
#
# cron 一律 UTC。台灣 = UTC + 8，全年固定，沒有日光節約。
# 分鐘刻意避開 :00 與 :30，那是全球排程最壅塞的時段。
# ------------------------------------------------------------------ #
on:
  schedule:
    - cron: '33,43,53 3 * * 1-5'            # 台灣 11:33 11:43 11:53
    - cron: '3,13,23,33,43,53 4 * * 1-5'    # 台灣 12:03 到 12:53
    - cron: '3,13,23,33,43,53 5 * * 1-5'    # 台灣 13:03 到 13:53
    - cron: '3,23,43 6 * * 1-5'             # 台灣 14:03 14:23 14:43
    - cron: '3 7 * * 1-5'                   # 台灣 15:03　最後一次，此時才判定今日無影片

  workflow_dispatch:
    inputs:
      backfill:
        description: '設為 true 時，一次處理 2026 年起尚未完成的全部影片'
        required: false
        default: 'false'
      final:
        description: '設為 true 時使用長逾時（30 分鐘），適合手動補跑'
        required: false
        default: 'false'
      repair_codes:
        description: '只修代號待確認。不碰逐字稿、不呼叫 Gemini，幾十秒跑完'
        required: false
        default: 'false'

# 同一時間只允許一個工作在跑，後來的排隊。
# 因為每次敲門最多 4 分鐘，10 分鐘的間隔足夠，不會堆積。
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # 輪詢階段每次都很短。真的抓到逐字稿時，潤飾加擷取約 10 到 20 分鐘。
    # 60 分鐘足夠，同時避免卡死的工作長時間佔住 concurrency 佇列。
    timeout-minutes: 60

    steps:
      - name: 記錄排程與實際執行時間
        run: |
          echo "排程設定：${{ github.event.schedule || '手動觸發' }} (UTC)"
          echo "實際執行：$(TZ=Asia/Taipei date '+%Y/%m/%d %H:%M:%S') 台北時間"
          echo ""
          echo "若兩者差超過 30 分鐘，是 GitHub 排程佇列延遲，不是設定寫錯。"
          echo "官方文件明講排程是 best effort，尖峰時段延遲 5 到 30 分鐘屬正常。"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 還原 NotebookLM 登入狀態
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          mkdir -p ~/.notebooklm
          printf '%s' "$NOTEBOOKLM_AUTH_JSON" > ~/.notebooklm/storage_state.json
          test -s ~/.notebooklm/storage_state.json \
            || { echo "NOTEBOOKLM_AUTH_JSON 是空的，請到 Secrets 貼上本機 storage_state.json 的完整內容"; exit 1; }

      - name: 執行每日流程
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEETS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SHEETS_SERVICE_ACCOUNT }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BACKFILL: ${{ github.event.inputs.backfill }}
          FINAL_ATTEMPT: ${{ github.event.inputs.final }}
          REPAIR_CODES: ${{ github.event.inputs.repair_codes }}
        run: python pipeline.py
